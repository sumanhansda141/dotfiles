# ── Clear default bindings that conflict ─────────────────
clear_all_shortcuts no

# ── Splits / panes ───────────────────────────────────────
map ctrl+b>% launch --location=vsplit --cwd=current
map ctrl+b>" launch --location=hsplit --cwd=current

# Navigate panes (vim-style)
map ctrl+b>h neighboring_window left
map ctrl+b>j neighboring_window down
map ctrl+b>k neighboring_window up
map ctrl+b>l neighboring_window right

# Trigger resize mode
# map ctrl+b>r start_resizing_window

map ctrl+b>x close_window
map ctrl+b>z toggle_layout stack

# ── Tabs (tmux "windows") ────────────────────────────────
map ctrl+b>c new_tab_with_cwd
map ctrl+b>n next_tab
map ctrl+b>p previous_tab
map ctrl+b>comma set_tab_title
map ctrl+b>ampersand close_tab

map ctrl+b>0 goto_tab 1
map ctrl+b>1 goto_tab 2
map ctrl+b>2 goto_tab 3
map ctrl+b>3 goto_tab 4
map ctrl+b>4 goto_tab 5
map ctrl+b>5 goto_tab 6
map ctrl+b>6 goto_tab 7
map ctrl+b>7 goto_tab 8
map ctrl+b>8 goto_tab 9
map ctrl+b>9 goto_tab 10

# ── Scrollback ───────────────────────────────────────────
map ctrl+b>bracketleft scroll_to_prompt -1
map ctrl+b>page_up      scroll_page_up
map ctrl+b>page_down    scroll_page_down
map ctrl+b>slash        show_scrollback

# ── Layouts ──────────────────────────────────────────────
map ctrl+b>space next_layout

# ── Misc ─────────────────────────────────────────────────
map ctrl+b>r load_config_file
map ctrl+b>shift+n new_os_window_with_cwd

# Keep a few standard kitty shortcuts
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
