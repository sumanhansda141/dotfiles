background {
    monitor =

    # Deep dark background
    color = rgba(0, 0, 0, 1.0)

    blur_passes = 1
    blur_size = 7

    # Subtle texture
    noise = 0.0117

    contrast = 0.92
    brightness = 0.78

    # Cooler teal-toned vibrancy
    vibrancy = 0.12
    vibrancy_darkness = 0.0
}

label {
    monitor =

    text = Hi there, $USER

    # Soft bright foreground
    color = rgba(252, 244, 220, 1)

    font_size = 25
    font_family = JetBrainsMono Nerd Font

    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =

    size = 220, 55

    outline_thickness = 3

    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = false
    dots_rounding = -1

    # Outer teal border
    outer_color = rgb(37, 145, 133)

    # Inner dark panel
    inner_color = rgb(0, 39, 49)

    # Main text color
    font_color = rgb(252, 244, 220)

    fade_on_empty = false
    fade_timeout = 1000

    placeholder_text = <i>Input Password...</i>

    hide_input = false

    rounding = 8

    # Success / checking
    check_color = rgb(32, 117, 199)

    # Failure
    fail_color = rgb(208, 27, 36)

    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300

    # Lock indicators
    capslock_color = rgb(165, 119, 5)
    numlock_color = rgb(37, 145, 133)
    bothlock_color = rgb(198, 27, 110)

    invert_numlock = false

    position = 0, -20
    halign = center
    valign = center
}
