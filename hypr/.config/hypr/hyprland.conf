################
### MONITORS ###
################

monitor=eDP-1, 1920x1080@144, 0x0, 1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$menu = fuzzel --show drun

#################
### AUTOSTART ###
#################

exec-once = nm-applet --indicator &
exec-once = blueman-applet &
exec-once = fcitx5 -d &
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = blueman-applet &
exec-once = nm-applet &
exec-once = waypaper --restore &
exec-once = mako &
exec-once = waybar &
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

# ## Slow app launch fix
exec-once = systemctl --user import-environment &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd &

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRSHOT_DIR, $HOME/Pictures/screenshots

cursor {
        inactive_timeout = 3        # hide cursor after 3s of inactivity (0 = never)
        hide_on_key_press = false   # hide when typing
        hide_on_touch = true        # hide on touch input (default)
        enable_hyprcursor = true    # use hyprcursor format if available
        use_cpu_buffer = 2          # 2 = auto (required for Nvidia HW cursors)
        no_hardware_cursors = false 
}

#####################
### LOOK AND FEEL ###
#####################

general {
    border_size = 2

    # Active teal border
    col.active_border = rgb(259185)

    # Muted inactive border
    col.inactive_border = rgba(465a61cc)

    layout = dwindle
    gaps_in = 5
    gaps_out = 10
    allow_tearing = false
}

decoration {
    rounding = 8
    active_opacity = 1.0

    shadow {
        enabled = true
        range = 18
        render_power = 3

        # Deep blue-black shadow
        color = rgba(001e26bb)
    }

    blur {
        enabled = false
        size = 5
        passes = 2
        new_optimizations = true
    }
}

group {
    insert_after_current = true

    groupbar {
        # Active tab
        col.active = rgba(002731ee)

        # Inactive tabs
        col.inactive = rgba(000000dd)

        # Typography
        text_color = rgb(fcf4dc)
        font_family = JetBrainsMono Nerd Font Mono
        font_size = 10

        # Layout
        height = 14
        stacked = false
        render_titles = true

        # Extras
        gradients = true
        priority = 3
    }

    # Borders
    col.border_active = rgb(259185)
    col.border_inactive = rgba(465a61cc)

    # Locked windows
    col.border_locked_active = rgb(d01b24)
    col.border_locked_inactive = rgba(d01b2488)
}

animations {
    enabled = yes

    bezier = windowAnim, 0.05, 0.9, 0.1, 1.05
    bezier = workspaceAnim, 0.16, 1, 0.3, 1.0

    animation = windows, 1, 5, windowAnim
    animation = windowsOut, 1, 5, windowAnim, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 2, workspaceAnim
}

misc {
    force_default_wallpaper = 1
    disable_hyprland_logo = true

    # Makes fullscreen transitions cleaner
    disable_splash_rendering = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us,us
    kb_variant = dvorak,
    kb_model =
    kb_options = ctrl:swapcaps,grp:win_space_toggle,shift:both_capslock
    kb_rules =
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
        sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = ALT

# Core application bindings
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, C, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Window state management
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, F, fullscreen, 0

bind = $mainMod, P, pseudo, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, G, exec, bash -c 'if hyprctl activewindow -j | jq -e ".floating"; then hyprctl dispatch cyclenext tiled; else hyprctl dispatch cyclenext floating; fi'

# Window resizing
bind = ALT, R, submap, resize
submap = resize
  binde = , H, resizeactive, -40 0
  binde = , J, resizeactive, 0 40
  binde = , K, resizeactive, 0 -40
  binde = , L, resizeactive, 40 0
  binde = , Left, resizeactive, -10 0
  binde = , Down, resizeactive, 0 10
  binde = , Up, resizeactive, 0 -10
  binde = , Right, resizeactive, 10 0
bind = , escape, submap, reset
submap = reset

# Window moving/swapping
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move and follow to workspace
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# Focus urgent window
bind = $mainMod, U, focusurgentorlast

# Quick workspace navigation (recent workspaces)
bind = $mainMod, bracketleft, workspace, m-1
bind = $mainMod, bracketright, workspace, m+1

# Group/tabbed window controls
bind = $mainMod, W, togglegroup,
bind = $mainMod SHIFT, W, moveoutofgroup
bind = $mainMod, N, changegroupactive, f
bind = $mainMod SHIFT, N, changegroupactive, b

# Scratchpad/special workspace
# Send to scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Toggle scratchpad
bind = $mainMod, S, togglespecialworkspace, magic

# Bring back to normal workspace from scratchpad
bind = $mainMod SHIFT, D, movetoworkspace, +0

# Bring back to normal workspace
bind = $mainMod SHIFT, D, movetoworkspace, +0

# Focus monitor
bind = $mainMod, comma, focusmonitor, -1
bind = $mainMod, period, focusmonitor, +1

# Move workspace to monitor
bind = $mainMod SHIFT, comma, movecurrentworkspacetomonitor, -1
bind = $mainMod SHIFT, period, movecurrentworkspacetomonitor, +1

# Mouse bindings (still useful for occasional use)
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# System controls
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5 
bind = , XF86AudioLowerVolume, exec, pamixer -d 5 
bind = , XF86AudioMicMute, exec, pamixer --default-source -m
bind = , XF86AudioMute, exec, pamixer -t
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Media controls
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Security
bind = $mainMod, Escape, exec, hyprlock

# Screenshots and recording
bind = $mainMod, A, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/record-screen.sh

# Keyboard layout
bind = SUPER, SPACE, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next
